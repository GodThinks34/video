<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>字幕可视化播放器 - CCapture 帧级无损渲染版</title>
    <!-- 引入 CCapture 核心依赖库 -->
    <script src="https://cdn.jsdelivr.net/npm/ccapture.js@1.1.0/build/CCapture.all.min.js"></script>
    <style>
        :root {
            --accent-color: #00f2fe; 
            --accent-gradient: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --card-bg: rgba(255, 255, 255, 0.04);       
            --card-border: rgba(255, 255, 255, 0.12);   
            --control-bg: rgba(20, 20, 25, 0.75);
        }

        body { 
            margin: 0; 
            background: #060608; 
            color: #f5f5f7; 
            display: flex; 
            align-items: center;      
            justify-content: center;   
            height: 100vh; 
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            letter-spacing: 0.5px;
        }
        
        #bg { 
            position: fixed; 
            width: 100%; 
            height: 100%; 
            z-index: -2; 
            object-fit: cover; 
            opacity: 0.2; 
            filter: blur(30px); 
        }

        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, rgba(10,10,12,0.2) 0%, #060608 100%);
        }
        
        .main-container {
            width: 88vw;            
            height: 82vh;           
            max-width: 1400px;
            max-height: 850px;
            background: var(--card-bg);
            backdrop-filter: blur(25px) saturate(120%); 
            -webkit-backdrop-filter: blur(25px) saturate(120%);
            border: 1px solid var(--card-border);
            border-radius: 32px;    
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6), 0 0 80px rgba(255, 255, 255, 0.02) inset; 
            display: flex;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }
        
        .left { 
            width: 45%; 
            height: 100%; 
            overflow-y: auto; 
            padding: 60px 40px 60px 80px; 
            box-sizing: border-box;
            scroll-behavior: smooth;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .left::-webkit-scrollbar { display: none; }
        
        .line { 
            font-size: 22px; 
            margin: 32px 0; 
            color: rgba(255,255,255,0.3); 
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); 
            transform-origin: left center;
            cursor: pointer;
            line-height: 1.4;
        }
        .line.active { 
            color: #fff; 
            font-size: 32px; 
            font-weight: 700; 
            text-shadow: 0 4px 20px rgba(0, 242, 254, 0.35);
            transform: scale(1.02);
        }
        
        .right { 
            width: 55%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding-right: 40px; 
            box-sizing: border-box;
            cursor: pointer;
        }
        
        #renderCanvas { display: none; }

        #previewCanvas {
            width: 90%;
            height: auto;
            aspect-ratio: 16 / 9;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            background: #000;
        }
        
        .controls { 
            position: absolute; 
            bottom: 30px; 
            left: 40px; 
            background: var(--control-bg); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px; 
            border-radius: 24px; 
            display: grid; 
            gap: 12px; 
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            z-index: 10;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            min-width: 260px;
        }
        .controls label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            cursor: pointer;
        }
        .controls input[type="file"] { display: none; }
        .file-custom {
            background: rgba(255,255,255,0.08);
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.2s;
            color: #fff;
        }
        .controls label:hover .file-custom {
            background: var(--accent-gradient);
            color: #000;
            font-weight: 500;
        }

        .export-btn {
            background: var(--accent-gradient);
            color: #000;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 5px;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        }
        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.5);
        }
        .export-btn:disabled {
            background: #444;
            color: #888;
            box-shadow: none;
            cursor: not-allowed;
        }

        .play-status {
            margin-top: 4px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: var(--accent-color);
        }
        .status-dot {
            width: 7px;
            height: 7px;
            background: var(--accent-color);
            border-radius: 50%;
            display: inline-block;
        }
        .status-dot.blink { animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .tips {
            position: absolute;
            bottom: 30px;
            right: 40px;
            font-size: 12px;
            color: rgba(255,255,255,0.25);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <img id="bg" src="">
    <div class="overlay"></div>
    
    <div class="main-container">
        <div class="left" id="lyrics"></div>
        
        <div class="right" id="playZone" title="点击预览区播放/暂停">
            <canvas id="previewCanvas"></canvas>
            <canvas id="renderCanvas" width="1920" height="1080"></canvas>
        </div>

        <div class="controls" onclick="event.stopPropagation();">
            <label>背景: <span class="file-custom">选择图片</span><input type="file" id="bgInput" accept="image/*"></label>
            <label>头像: <span class="file-custom">选择图片</span><input type="file" id="avaInput" accept="image/*"></label>
            <label>字幕: <span class="file-custom">选择字幕</span><input type="file" id="subInput" accept=".vtt,.srt"></label>
            <label>音频: <span class="file-custom">选择音频</span><input type="file" id="audioInput" accept="audio/*"></label>
            
            <button class="export-btn" id="exportBtn" disabled>使用 CCapture 导出无损视频</button>

            <div class="play-status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">等待上传音频素材...</span>
            </div>
        </div>

        <div class="tips">提示：点击右侧预览区或按 [空格键] 播放/暂停</div>
    </div>

    <script>
        let subtitleData = [];
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const exportBtn = document.getElementById('exportBtn');

        const rCanvas = document.getElementById('renderCanvas');
        const rCtx = rCanvas.getContext('2d');
        const pCanvas = document.getElementById('previewCanvas');
        const pCtx = pCanvas.getContext('2d');

        let bgImg = new Image();
        let avaImg = new Image();
        let currentSubtitleText = "";
        let avatarRotation = 0;
        
        // 音频系统
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        analyser.connect(audioCtx.destination);
        
        let audioBuffer = null;        
        let audioSource = null;        
        let audioStartTime = 0;        
        let audioCurrentTime = 0;      
        let isPlaying = false;
        let dataArray = new Uint8Array(analyser.frequencyBinCount);

        // CCapture 控制器
        let capturer = null;
        let isExporting = false;
        const FPS = 60; // 锁定 60 帧无损输出

        pCanvas.width = 1920; pCanvas.height = 1080;

        // 实时非导出常驻循环
        function drawFrameLoop() {
            if (!isExporting) {
                renderFrame();
                requestAnimationFrame(drawFrameLoop);
            }
        }
        drawFrameLoop();

        // 素材导入
        document.getElementById('bgInput').onchange = (e) => {
            if(e.target.files[0]) bgImg.src = URL.createObjectURL(e.target.files[0]);
        };
        document.getElementById('avaInput').onchange = (e) => {
            if(e.target.files[0]) avaImg.src = URL.createObjectURL(e.target.files[0]);
        };

        document.getElementById('audioInput').onchange = (e) => {
            const file = e.target.files[0];
            if(!file) return;

            statusText.innerText = "音频底层高精解码中...";
            exportBtn.disabled = true;
            if(isPlaying) { stopAudio(); }

            const reader = new FileReader();
            reader.onload = function(evt) {
                const arrayBuffer = evt.target.result;
                audioCtx.decodeAudioData(arrayBuffer, function(buffer) {
                    audioBuffer = buffer;
                    audioCurrentTime = 0;
                    exportBtn.disabled = false;
                    statusText.innerText = "素材加载成功！点击预览区播放";
                    statusDot.classList.remove('blink');
                }, function(err) {
                    statusText.innerText = "解码失败，请更换音频";
                });
            };
            reader.readAsArrayBuffer(file);
        };

        // 核心单帧渲染器
        function renderFrame() {
            rCtx.fillStyle = "#060608";
            rCtx.fillRect(0, 0, 1920, 1080);

            if (bgImg.src && bgImg.width > 0) {
                rCtx.save();
                rCtx.globalAlpha = 0.25;
                let scale = Math.max(1920 / bgImg.width, 1080 / bgImg.height);
                let w = bgImg.width * scale;
                let h = bgImg.height * scale;
                rCtx.drawImage(bgImg, (1920 - w)/2, (1080 - h)/2, w, h);
                rCtx.restore();
            }

            let avX = 1350, avY = 420, avR = 160; 
            
            // 帧率独立控制旋转
            if (isPlaying || isExporting) { avatarRotation += 0.012; }

            if (avaImg.src && avaImg.width > 0) {
                rCtx.save();
                rCtx.shadowColor = "rgba(0, 242, 254, 0.25)";
                rCtx.shadowBlur = 50;
                rCtx.beginPath();
                rCtx.arc(avX, avY, avR, 0, Math.PI * 2);
                rCtx.closePath();
                rCtx.clip();
                rCtx.translate(avX, avY);
                rCtx.rotate(avatarRotation);
                rCtx.drawImage(avaImg, -avR, -avR, avR*2, avR*2);
                rCtx.restore();
                
                rCtx.save();
                rCtx.strokeStyle = "rgba(255,255,255,0.2)";
                rCtx.lineWidth = 4;
                rCtx.beginPath();
                rCtx.arc(avX, avY, avR, 0, Math.PI * 2);
                rCtx.stroke();
                rCtx.restore();
            }

            // 获取音频频谱数据
            if (isExporting) {
                // 【CCapture 核心修复】：在导出状态下，不能用实时的 getByteFrequencyData
                // 我们直接根据当前导出的虚拟时间轴，精准抽样原始 PCM 缓存，100% 还原跳动
                extractSpectrumFromBuffer(audioCurrentTime);
            } else if (isPlaying) {
                analyser.getByteFrequencyData(dataArray);
                audioCurrentTime = audioCtx.currentTime - audioStartTime;
                if (audioCurrentTime >= audioBuffer.duration) { stopAudio(); }
                updateSubtitleProgress();
            } else {
                for(let i=0; i<dataArray.length; i++) { dataArray[i] = Math.max(0, dataArray[i] - 4); }
            }
            
            // 绘制音频柱
            rCtx.save();
            let barWidth = 6;
            let gap = 4;
            let startX = avX - (dataArray.length * (barWidth + gap)) / 4;
            let startY = 820;

            const gradient = rCtx.createLinearGradient(0, startY, 0, startY - 150);
            gradient.addColorStop(0, 'rgba(0, 242, 254, 0.1)');
            gradient.addColorStop(1, 'rgba(79, 172, 254, 0.95)');

            dataArray.forEach((val, i) => {
                if(i % 2 === 0) { 
                    let h = (val / 255) * 140;
                    if (h < 4 && (isPlaying || isExporting)) h = 4; 
                    rCtx.fillStyle = gradient;
                    rCtx.fillRect(startX + i*(barWidth+gap)/2, startY - h, barWidth, h);
                }
            });
            rCtx.restore();

            if (currentSubtitleText) {
                rCtx.save();
                rCtx.font = "bold 52px -apple-system, BlinkMacSystemFont, sans-serif";
                rCtx.fillStyle = "#ffffff";
                rCtx.shadowColor = "rgba(0, 242, 254, 0.5)";
                rCtx.shadowBlur = 20;
                rCtx.textAlign = "center";
                rCtx.fillText(currentSubtitleText, avX, 950);
                rCtx.restore();
            }

            // 同步刷新前端可见的预览区
            pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
            pCtx.drawImage(rCanvas, 0, 0, pCanvas.width, pCanvas.height);
        }

        // 针对 CCapture 异步时间轴的专属频谱提取算法
        function extractSpectrumFromBuffer(time) {
            if (!audioBuffer) return;
            const sampleRate = audioBuffer.sampleRate;
            const startSample = Math.floor(time * sampleRate);
            const channelData = audioBuffer.getChannelData(0); // 抓取左声道物理波形
            
            // 模拟 FFT 转换，把时域数据变换为顺滑的频域跳动
            let windowSize = 256;
            for (let i = 0; i < dataArray.length; i++) {
                let sampleIdx = startSample + i * 2;
                let val = 0;
                if (sampleIdx < channelData.length) {
                    val = Math.abs(channelData[sampleIdx]) * 350; // 放大系数
                }
                // 加入随频率增高的衰减及平滑滤波
                let target = Math.min(255, val * (1 + i / 32));
                dataArray[i] = dataArray[i] * 0.4 + target * 0.6; 
            }
        }

        // 播放控制
        function playAudio(startAt = 0) {
            if (!audioBuffer) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            audioSource = audioCtx.createBufferSource();
            audioSource.buffer = audioBuffer;
            audioSource.connect(analyser);
            
            audioStartTime = audioCtx.currentTime - startAt;
            audioSource.start(0, startAt);
            isPlaying = true;
            statusDot.classList.add('blink');
            statusText.innerText = "正在播放";
        }

        function stopAudio() {
            if (audioSource) {
                try { audioSource.stop(); } catch(e){}
                audioSource.disconnect();
                audioSource = null;
            }
            isPlaying = false;
            statusDot.classList.remove('blink');
            statusText.innerText = "已暂停";
        }

        function togglePlay() {
            if (isExporting || !audioBuffer) return;
            if (isPlaying) {
                audioCurrentTime = audioCtx.currentTime - audioStartTime;
                stopAudio();
            } else {
                if (audioCurrentTime >= audioBuffer.duration) audioCurrentTime = 0;
                playAudio(audioCurrentTime);
            }
        }

        document.getElementById('playZone').onclick = () => togglePlay();
        window.addEventListener('keydown', (e) => {
            if (e.code === "Space") { e.preventDefault(); togglePlay(); }
        });

        // 字幕解析
        document.getElementById('subInput').onchange = (e) => {
            if(!e.target.files[0]) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const text = event.target.result;
                const container = document.getElementById('lyrics');
                container.innerHTML = "";
                subtitleData = [];

                const regex = /(\d{2}:\d{2}:\d{2}[\.,]\d{3}) --> (\d{2}:\d{2}:\d{2}[\.,]\d{3})\s*\n([\s\S]*?)(?=\n\n|\n\d|\n\d{2}:|$)/g;
                let match;
                while ((match = regex.exec(text)) !== null) {
                    const start = timeToSec(match[1]);
                    const end = timeToSec(match[2]);
                    const content = match[3].replace(/\r?\n/g, " ").trim();
                    subtitleData.push({ start, end, content });
                    
                    const div = document.createElement('div');
                    div.className = 'line';
                    div.innerText = content;
                    div.onclick = (event) => {
                        event.stopPropagation();
                        audioCurrentTime = start;
                        if (isPlaying) { stopAudio(); playAudio(start); } else { updateSubtitleProgress(); }
                    };
                    container.appendChild(div);
                }
            };
            reader.readAsText(e.target.files[0]);
        };

        function updateSubtitleProgress() {
            const lines = document.querySelectorAll('.line');
            let found = false;
            subtitleData.forEach((sub, index) => {
                if (audioCurrentTime >= sub.start && audioCurrentTime <= sub.end) {
                    found = true;
                    currentSubtitleText = sub.content;
                    const currentActive = document.querySelector('.line.active');
                    if (currentActive && currentActive !== lines[index]) currentActive.classList.remove('active');
                    if (!lines[index].classList.contains('active')) {
                        lines[index].classList.add('active');
                        lines[index].scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }
            });
            if(!found) currentSubtitleText = ""; 
        }

        function timeToSec(t) {
            const parts = t.split(/:|[\.,]/);
            return parseInt(parts[0])*3600 + parseInt(parts[1])*60 + parseInt(parts[2]) + parseInt(parts[3])/1000;
        }

        // ==========================================
        // CCapture 帧级极限无损硬核重绘导出引擎
        // ==========================================
        exportBtn.onclick = function(e) {
            e.stopPropagation();
            if (isExporting || !audioBuffer) return;

            isExporting = true;
            exportBtn.disabled = true;
            stopAudio();

            statusDot.classList.add('blink');
            statusText.innerText = "CCapture 引擎初始化...";

            // 初始化 CCapture (配置高规格 WebM 录制格式)
            capturer = new CCapture({ 
                format: 'webm', 
                workersPath: 'https://cdn.jsdelivr.net/npm/ccapture.js@1.1.0/src/',
                framerate: FPS,
                name: `CCapture_Render_${Date.now()}`,
                quality: 100 
            });

            audioCurrentTime = 0;
            avatarRotation = 0;
            capturer.start();

            // 启动硬核受控帧渲染链条
            function renderStep() {
                if (!isExporting) return;

                // 1. 强行重绘当前帧
                renderFrame();
                updateSubtitleProgress();

                // 2. 捕获当前隐藏 Canvas 的物理像素
                capturer.capture(rCanvas);

                // 3. 虚拟推进时间轴 (严格按 60fps 步进)
                audioCurrentTime += 1 / FPS;

                if (audioCurrentTime >= audioBuffer.duration) {
                    // 渲染截止，通知 CCapture 封装输出
                    statusText.innerText = "渲染完毕！CCapture 正在打包 WebM 容器...";
                    capturer.stop();
                    capturer.save();
                    
                    isExporting = false;
                    exportBtn.disabled = false;
                    audioCurrentTime = 0;
                    statusText.innerText = "无损视频导出成功！";
                    drawFrameLoop(); // 恢复常驻循环
                } else {
                    // 进度反馈
                    let progress = ((audioCurrentTime / audioBuffer.duration) * 100).toFixed(1);
                    statusText.innerText = `CCapture 帧级超清合成中: ${progress}%`;
                    
                    // 采用 setTimeout 释放主线程阻塞，防止浏览器长时间无响应崩溃
                    setTimeout(renderStep, 0); 
                }
            }

            renderStep();
        };
    </script>
</body>
</html>
