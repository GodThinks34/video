<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>全新布局：字幕可视化渲染器</title>
    <script src="https://cdn.jsdelivr.net/npm/ccapture.js@1.1.0/build/CCapture.all.min.js"></script>
    <style>
        :root {
            --accent-color: #00f2fe; 
            --accent-gradient: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --card-bg: rgba(255, 255, 255, 0.04);       
            --card-border: rgba(255, 255, 255, 0.12);   
            --control-bg: rgba(20, 20, 25, 0.85);
        }
        body { margin: 0; background: #060608; color: #f5f5f7; height: 100vh; overflow: hidden; font-family: sans-serif; display: flex; align-items: center; justify-content: center; }
        
        .main-container {
            width: 90vw; height: 80vh; max-width: 1200px;
            background: var(--card-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--card-border); border-radius: 32px;
            display: flex; overflow: hidden; position: relative;
        }
        
        /* 左侧字幕区 - 滚动逻辑与样式 */
        .left { 
            width: 40%; height: 100%; overflow-y: auto; padding: 40px; box-sizing: border-box;
            border-right: 1px solid var(--card-border);
        }
        .line { font-size: 20px; margin: 30px 0; color: rgba(255,255,255,0.3); transition: 0.4s; cursor: pointer; }
        .line.active { color: #fff; font-size: 28px; font-weight: bold; transform: scale(1.05); }
        
        /* 右侧视觉区 - 包含头像与频谱 */
        .right { width: 60%; display: flex; align-items: center; justify-content: center; position: relative; }
        #renderCanvas { width: 100%; height: 100%; }

        .controls { position: absolute; bottom: 20px; left: 20px; background: var(--control-bg); padding: 15px; border-radius: 20px; z-index: 10; font-size: 13px; }
        .export-btn { background: var(--accent-gradient); border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    
    <div class="main-container">
        <div class="left" id="lyrics"></div>
        <div class="right" id="playZone">
            <canvas id="renderCanvas"></canvas>
        </div>

        <div class="controls">
            <input type="file" id="bgInput" accept="image/*">背景
            <input type="file" id="avaInput" accept="image/*">头像
            <input type="file" id="subInput" accept=".srt">字幕
            <input type="file" id="audioInput" accept="audio/*">音频
            <button class="export-btn" id="exportBtn" disabled>开始渲染</button>
            <div id="statusText">请上传素材</div>
        </div>
    </div>

    <script>
        const rCanvas = document.getElementById('renderCanvas');
        const rCtx = rCanvas.getContext('2d');
        rCanvas.width = 1280; rCanvas.height = 720;

        let bgImg = new Image(), avaImg = new Image();
        let avatarRotation = 0, currentSubtitleText = "";
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let analyser = audioCtx.createAnalyser();
        let dataArray = new Uint8Array(128);
        
        // 渲染核心逻辑[cite: 2]
        function renderFrame() {
            rCtx.fillStyle = "#060608";
            rCtx.fillRect(0, 0, 1280, 720);

            // 绘制背景
            if (bgImg.src) { rCtx.globalAlpha = 0.2; rCtx.drawImage(bgImg, 0, 0, 1280, 720); rCtx.globalAlpha = 1; }

            // 绘制头像 (右侧区域中心)
            const centerX = 640, centerY = 300;
            if (avaImg.src) {
                rCtx.save();
                rCtx.translate(centerX, centerY);
                rCtx.rotate(avatarRotation += 0.02);
                rCtx.beginPath(); rCtx.arc(0, 0, 100, 0, Math.PI * 2); rCtx.clip();
                rCtx.drawImage(avaImg, -100, -100, 200, 200);
                rCtx.restore();
            }

            // 绘制音频频谱
            analyser.getByteFrequencyData(dataArray);
            rCtx.fillStyle = "#00f2fe";
            dataArray.forEach((val, i) => {
                let h = (val / 255) * 150;
                rCtx.fillRect(centerX - 200 + i * 3.2, 500 - h, 2, h);
            });

            // 绘制字幕
            if (currentSubtitleText) {
                rCtx.fillStyle = "#fff";
                rCtx.font = "bold 30px sans-serif";
                rCtx.textAlign = "center";
                rCtx.fillText(currentSubtitleText, centerX, 650);
            }
            requestAnimationFrame(renderFrame);
        }
        renderFrame();

        // 保持原有的文件处理与导出逻辑[cite: 2]
        document.getElementById('audioInput').onchange = (e) => { /* 此处集成音频解码逻辑 */ };
        document.getElementById('subInput').onchange = (e) => { /* 此处集成 SRT 解析逻辑 */ };
        document.getElementById('exportBtn').onclick = () => { /* 此处集成 CCapture 导出循环 */ };
    </script>
</body>
</html>
