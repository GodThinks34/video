<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>字幕可视化播放器</title>
    <style>
        :root {
            --accent-color: #00f2fe; 
            --accent-gradient: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --card-bg: rgba(255, 255, 255, 0.04);       /* 核心卡片的磨砂质感背景 */
            --card-border: rgba(255, 255, 255, 0.12);   /* 卡片高级微光边框 */
            --control-bg: rgba(20, 20, 25, 0.6);
        }

        body { 
            margin: 0; 
            background: #060608; 
            color: #f5f5f7; 
            display: flex; 
            align-items: center;      /* 确保核心卡片上下居中 */
            justify-content: center;   /* 确保核心卡片左右居中 */
            height: 100vh; 
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            letter-spacing: 0.5px;
        }
        
        /* 底层全局背景 */
        #bg { 
            position: fixed; 
            width: 100%; 
            height: 100%; 
            z-index: -2; 
            object-fit: cover; 
            opacity: 0.2; 
            filter: blur(30px); 
        }

        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, rgba(10,10,12,0.2) 0%, #060608 100%);
        }
        
        /* 【核心修改】：上层二次背景大卡片框 */
        .main-container {
            width: 88vw;            /* 限制总宽度，不让内容死贴屏幕边缘 */
            height: 82vh;           /* 限制总高度 */
            max-width: 1400px;
            max-height: 850px;
            background: var(--card-bg);
            backdrop-filter: blur(25px) saturate(120%); /* 卡片内部的背景更亮、更通透 */
            -webkit-backdrop-filter: blur(25px) saturate(120%);
            border: 1px solid var(--card-border);
            border-radius: 32px;    /* 优雅的大圆角 */
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6), 
                        0 0 80px rgba(255, 255, 255, 0.02) inset; /* 增加精致的内发光 */
            display: flex;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }
        
        /* 左侧字幕区排版优化 */
        .left { 
            width: 45%; 
            height: 100%; 
            overflow-y: auto; 
            padding: 60px 40px 60px 80px; /* 加大左内边距 (80px)，把SRT字幕优雅地往右推，不再挨着死左边 */
            box-sizing: border-box;
            scroll-behavior: smooth;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .left::-webkit-scrollbar { display: none; }
        
        /* 字幕样式 */
        .line { 
            font-size: 22px; 
            margin: 32px 0; 
            color: rgba(255,255,255,0.3); 
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); 
            transform-origin: left center;
            cursor: pointer;
            line-height: 1.4;
        }
        .line:hover {
            color: rgba(255,255,255,0.6);
        }
        .line.active { 
            color: #fff; 
            font-size: 32px; 
            font-weight: 700; 
            text-shadow: 0 4px 20px rgba(0, 242, 254, 0.35);
            transform: scale(1.02);
        }
        
        /* 右侧视觉区排版优化 */
        .right { 
            width: 55%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding-right: 40px; /* 让右侧内容稍微向右收紧对齐 */
            box-sizing: border-box;
        }
        
        /* 头像设计 */
        #avatar { 
            width: 260px; 
            height: 260px; 
            border-radius: 50%; 
            border: 2px solid rgba(255,255,255,0.15); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 40px rgba(0, 242, 254, 0.1);
            margin-bottom: 50px; 
            object-fit: cover;
        }
        .spinning { animation: spin 25s linear infinite; }
        .paused { animation-play-state: paused; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        #audioPlayer { display: none; }
        
        /* 动画波形 */
        canvas { 
            width: 80%; 
            height: 90px; 
            background: transparent;
        }
        
        /* 控制面板——嵌入卡片左下角 */
        .controls { 
            position: absolute; 
            bottom: 30px; 
            left: 40px; 
            background: var(--control-bg); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 16px 20px; 
            border-radius: 20px; 
            display: grid; 
            gap: 10px; 
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 10;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }
        .controls label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            cursor: pointer;
        }
        .controls input[type="file"] { display: none; }
        .file-custom {
            background: rgba(255,255,255,0.08);
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.2s;
            color: #fff;
        }
        .controls label:hover .file-custom {
            background: var(--accent-gradient);
            color: #000;
            font-weight: 500;
        }

        /* 播放状态 */
        .play-status {
            margin-top: 4px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: var(--accent-color);
        }
        .status-dot {
            width: 7px;
            height: 7px;
            background: var(--accent-color);
            border-radius: 50%;
            display: inline-block;
        }
        .status-dot.blink { animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* 右下角提示 */
        .tips {
            position: absolute;
            bottom: 30px;
            right: 40px;
            font-size: 12px;
            color: rgba(255,255,255,0.25);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- 最底层全局弱背景 -->
    <img id="bg" src="">
    <div class="overlay"></div>
    
    <!-- 【核心新增】：上层二次背景卡片框容器 -->
    <div class="main-container" id="playZone" title="点击空白处播放/暂停">
        
        <!-- 左侧字幕：内边距已优化，完美移出最左侧死角 -->
        <div class="left" id="lyrics"></div>
        
        <!-- 右侧内容：布局微调，与左侧形成完美的中轴对称平衡 -->
        <div class="right">
            <img id="avatar" src="" class="spinning paused">
            <audio id="audioPlayer"></audio>
            <canvas id="visualizer"></canvas>
        </div>

        <!-- 悬浮在卡片左下角的操控台 -->
        <div class="controls" onclick="event.stopPropagation();">
            <label>背景: <span class="file-custom">选择图片</span><input type="file" id="bgInput" accept="image/*"></label>
            <label>头像: <span class="file-custom">选择图片</span><input type="file" id="avaInput" accept="image/*"></label>
            <label>字幕: <span class="file-custom">选择字幕</span><input type="file" id="subInput" accept=".vtt,.srt"></label>
            <label>音频: <span class="file-custom">选择音频</span><input type="file" id="audioInput" accept="audio/*"></label>
            <div class="play-status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">已暂停</span>
            </div>
        </div>

        <div class="tips">提示：点击卡片右侧空白或按 [空格键] 播放/暂停</div>
    </div>

    <script>
        let subtitleData = [];
        const audio = document.getElementById('audioPlayer');
        const avatar = document.getElementById('avatar');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        // 默认透明底色占位
        document.getElementById('bg').src = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";
        avatar.src = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";

        // 文件加载
        document.getElementById('bgInput').onchange = (e) => {
            if(e.target.files[0]) document.getElementById('bg').src = URL.createObjectURL(e.target.files[0]);
        }
        document.getElementById('avaInput').onchange = (e) => {
            if(e.target.files[0]) avatar.src = URL.createObjectURL(e.target.files[0]);
        }
        document.getElementById('audioInput').onchange = (e) => {
            if(e.target.files[0]) {
                audio.src = URL.createObjectURL(e.target.files[0]);
                setupVisualizer();
                togglePlay(true);
            }
        };

        // 播控逻辑
        function togglePlay(forcePlay = null) {
            if (forcePlay === true || audio.paused) {
                audio.play().then(() => {
                    avatar.classList.remove('paused');
                    statusDot.classList.add('blink');
                    statusText.innerText = "正在播放";
                }).catch(() => {});
            } else {
                audio.pause();
                avatar.classList.add('paused');
                statusDot.classList.remove('blink');
                statusText.innerText = "已暂停";
            }
        }

        // 点击大卡片区域控制播放
        document.getElementById('playZone').onclick = (e) => {
            togglePlay();
        };

        // 空格键支持
        window.addEventListener('keydown', (e) => {
            if (e.code === "Space") {
                e.preventDefault();
                togglePlay();
            }
        });

        // 字幕解析 (全面兼容 SRT 与 VTT 换行)
        document.getElementById('subInput').onchange = (e) => {
            if(!e.target.files[0]) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const text = event.target.result;
                const container = document.getElementById('lyrics');
                container.innerHTML = "";
                subtitleData = [];

                const regex = /(\d{2}:\d{2}:\d{2}[\.,]\d{3}) --> (\d{2}:\d{2}:\d{2}[\.,]\d{3})\s*\n([\s\S]*?)(?=\n\n|\n\d|\n\d{2}:|$)/g;
                let match;
                let index = 0;
                while ((match = regex.exec(text)) !== null) {
                    const start = timeToSec(match[1]);
                    const end = timeToSec(match[2]);
                    const content = match[3].replace(/\r?\n/g, " ").trim();
                    
                    subtitleData.push({ start, end, content });
                    
                    const div = document.createElement('div');
                    div.className = 'line';
                    div.innerText = content;
                    
                    div.onclick = (event) => {
                        event.stopPropagation(); // 阻止触发背景点击暂停
                        audio.currentTime = start;
                        togglePlay(true);
                    };
                    container.appendChild(div);
                    index++;
                }
            };
            reader.readAsText(e.target.files[0]);
        };

        // 字幕同步滚动
        audio.ontimeupdate = () => {
            const lines = document.querySelectorAll('.line');
            subtitleData.forEach((sub, index) => {
                if (audio.currentTime >= sub.start && audio.currentTime <= sub.end) {
                    const currentActive = document.querySelector('.line.active');
                    if (currentActive && currentActive !== lines[index]) {
                        currentActive.classList.remove('active');
                    }
                    if (!lines[index].classList.contains('active')) {
                        lines[index].classList.add('active');
                        lines[index].scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }
            });
        };

        function timeToSec(t) {
            const parts = t.split(/:|[\.,]/);
            return parseInt(parts[0])*3600 + parseInt(parts[1])*60 + parseInt(parts[2]) + parseInt(parts[3])/1000;
        }

        // 极光渐变波形逻辑
        let isVisualizerSetup = false;
        function setupVisualizer() {
            if (isVisualizerSetup) return;
            isVisualizerSetup = true;

            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = ctx.createAnalyser();
            analyser.fftSize = 256; 
            analyser.connect(ctx.destination);
            const source = ctx.createMediaElementSource(audio);
            source.connect(analyser);
            
            const canvas = document.getElementById('visualizer');
            const canvasCtx = canvas.getContext('2d');
            const data = new Uint8Array(analyser.frequencyBinCount);
            
            function draw() {
                requestAnimationFrame(draw);
                analyser.getByteFrequencyData(data);
                canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
                
                const barWidth = (canvas.width / data.length) * 1.8;
                let barHeight;
                let x = 0;

                const gradient = canvasCtx.createLinearGradient(0, canvas.height, 0, 0);
                gradient.addColorStop(0, 'rgba(0, 242, 254, 0.15)');
                gradient.addColorStop(1, 'rgba(79, 172, 254, 0.95)');
                
                data.forEach((val) => {
                    barHeight = (val / 255) * canvas.height * 0.85;
                    canvasCtx.fillStyle = gradient;
                    canvasCtx.fillRect(x, canvas.height - barHeight, barWidth - 2, barHeight);
                    x += barWidth;
                });
            }
            draw();
        }
    </script>
</body>
</html>
