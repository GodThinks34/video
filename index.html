<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>字幕可视化播放器 - 极速轻量渲染版 (左右布局)</title>
    <script src="https://cdn.jsdelivr.net/npm/ccapture.js@1.1.0/build/CCapture.all.min.js"></script>
    <style>
        :root {
            --accent-color: #00f2fe;
            --accent-gradient: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --card-bg: rgba(255, 255, 255, 0.04);       
            --card-border: rgba(255, 255, 255, 0.12);
            --control-bg: rgba(20, 20, 25, 0.75);
        }

        body { 
            margin: 0;
            background: #060608; 
            color: #f5f5f7; 
            display: flex; 
            align-items: center;      
            justify-content: center;   
            height: 100vh; 
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            letter-spacing: 0.5px;
        }
        
        #bg { 
            position: fixed;
            width: 100%; 
            height: 100%; 
            z-index: -2; 
            object-fit: cover; 
            opacity: 0.2; 
            filter: blur(30px);
        }

        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, rgba(10,10,12,0.2) 0%, #060608 100%);
        }
        
        .main-container {
            width: 88vw;
            height: 82vh;           
            max-width: 1400px;
            max-height: 850px;
            background: var(--card-bg);
            backdrop-filter: blur(25px) saturate(120%); 
            -webkit-backdrop-filter: blur(25px) saturate(120%);
            border: 1px solid var(--card-border);
            border-radius: 32px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6), 0 0 80px rgba(255, 255, 255, 0.02) inset; 
            display: flex;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }
        
        .left { 
            width: 45%;
            height: 100%; 
            overflow-y: auto; 
            padding: 60px 40px 60px 80px; 
            box-sizing: border-box;
            scroll-behavior: smooth;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .left::-webkit-scrollbar { display: none; }
        
        .line { 
            font-size: 22px;
            margin: 32px 0; 
            color: rgba(255,255,255,0.3); 
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); 
            transform-origin: left center;
            cursor: pointer;
            line-height: 1.4;
        }
        .line.active { 
            color: #fff;
            font-size: 32px; 
            font-weight: 700; 
            text-shadow: 0 4px 20px rgba(0, 242, 254, 0.35);
            transform: scale(1.02);
        }
        
        .right { 
            width: 55%;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 0 40px; 
            box-sizing: border-box;
            cursor: pointer;
        }
        
        #renderCanvas { display: none; }

        #previewCanvas {
            width: 100%;
            max-width: 680px; 
            height: auto;
            aspect-ratio: 16 / 9;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            background: #000;
        }
        
        .controls { 
            position: absolute;
            bottom: 30px; 
            left: 40px; 
            background: var(--control-bg); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px; 
            border-radius: 24px; 
            display: grid; 
            gap: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            z-index: 10;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            min-width: 260px;
        }
        .controls label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            cursor: pointer;
        }
        .controls input[type="file"] { display: none; }
        .file-custom {
            background: rgba(255,255,255,0.08);
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.2s;
            color: #fff;
        }
        .controls label:hover .file-custom {
            background: var(--accent-gradient);
            color: #000;
            font-weight: 500;
        }

        .export-btn {
            background: var(--accent-gradient);
            color: #000;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 5px;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        }
        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.5);
        }
        .export-btn:disabled {
            background: #444;
            color: #888;
            box-shadow: none;
            cursor: not-allowed;
        }

        .play-status {
            margin-top: 4px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: var(--accent-color);
        }
        .status-dot {
            width: 7px;
            height: 7px;
            background: var(--accent-color);
            border-radius: 50%;
            display: inline-block;
        }
        .status-dot.blink { animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .tips {
            position: absolute;
            bottom: 30px;
            right: 40px;
            font-size: 12px;
            color: rgba(255,255,255,0.25);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <img id="bg" src="">
    <div class="overlay"></div>
    
    <div class="main-container">
        <div class="left" id="lyrics"></div>
        
        <div class="right" id="playZone" title="点击预览区播放/暂停">
            <canvas id="previewCanvas"></canvas>
            <canvas id="renderCanvas"></canvas>
        </div>

        <div class="controls" onclick="event.stopPropagation();">
            <label>背景: <span class="file-custom">选择图片</span><input type="file" id="bgInput" accept="image/*"></label>
            <label>头像: <span class="file-custom">选择图片</span><input type="file" id="avaInput" accept="image/*"></label>
            <label>字幕: <span class="file-custom">选择字幕</span><input type="file" id="subInput" accept=".vtt,.srt"></label>
            <label>音频: <span class="file-custom">选择音频</span><input type="file" id="audioInput" accept="audio/*"></label>
            
            <button class="export-btn" id="exportBtn" disabled>使用 CCapture 后台挂机导出</button>

            <div class="play-status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">等待上传音频素材...</span>
            </div>
        </div>

        <div class="tips">提示：升级支持缩小/切后台挂机渲染</div>
    </div>

    <script>
        let subtitleData = [];
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const exportBtn = document.getElementById('exportBtn');

        const rCanvas = document.getElementById('renderCanvas');
        const rCtx = rCanvas.getContext('2d');
        const pCanvas = document.getElementById('previewCanvas');
        const pCtx = pCanvas.getContext('2d');

        let bgImg = new Image();
        let avaImg = new Image();
        
        // 字幕渲染核心状态
        let currentSubtitleText = "";
        let currentSubIndex = -1;  // 当前激活的字幕索引
        let lyricScrollY = 0;      // 画布上的字幕滚动偏移量

        let avatarRotation = 0;
        
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        analyser.connect(audioCtx.destination);
        
        let audioBuffer = null;        
        let audioSource = null;        
        let audioStartTime = 0;        
        let audioCurrentTime = 0;
        let isPlaying = false;
        let dataArray = new Uint8Array(analyser.frequencyBinCount);

        let capturer = null;
        let isExporting = false;
        let bgWorker = null; 
        
        const FPS = 20;
        rCanvas.width = 1280; rCanvas.height = 720;
        pCanvas.width = 1280; pCanvas.height = 720;

        function drawFrameLoop() {
            if (!isExporting) {
                renderFrame();
                requestAnimationFrame(drawFrameLoop);
            }
        }
        drawFrameLoop();

        document.getElementById('bgInput').onchange = (e) => {
            if(e.target.files[0]) bgImg.src = URL.createObjectURL(e.target.files[0]);
        };
        document.getElementById('avaInput').onchange = (e) => {
            if(e.target.files[0]) avaImg.src = URL.createObjectURL(e.target.files[0]);
        };

        document.getElementById('audioInput').onchange = (e) => {
            const file = e.target.files[0];
            if(!file) return;

            statusText.innerText = "音频底层高精解码中...";
            exportBtn.disabled = true;
            if(isPlaying) { stopAudio(); }

            const reader = new FileReader();
            reader.onload = function(evt) {
                const arrayBuffer = evt.target.result;
                audioCtx.decodeAudioData(arrayBuffer, function(buffer) {
                    audioBuffer = buffer;
                    audioCurrentTime = 0;
                    exportBtn.disabled = false;
                    statusText.innerText = "素材加载成功！点击预览区播放";
                    statusDot.classList.remove('blink');
                }, function(err) {
                    statusText.innerText = "解码失败";
                });
            };
            reader.readAsArrayBuffer(file);
        };

        function renderFrame() {
            // 1. 绘制纯色背景
            rCtx.fillStyle = "#060608";
            rCtx.fillRect(0, 0, 1280, 720);

            // 2. 绘制图片背景 (毛玻璃暗化效果)
            if (bgImg.src && bgImg.width > 0) {
                rCtx.save();
                rCtx.globalAlpha = 0.25;
                let scale = Math.max(1280 / bgImg.width, 720 / bgImg.height);
                let w = bgImg.width * scale;
                let h = bgImg.height * scale;
                rCtx.drawImage(bgImg, (1280 - w)/2, (720 - h)/2, w, h);
                rCtx.restore();
            }

            // 更新状态
            if (isExporting) {
                extractSpectrumFromBuffer(audioCurrentTime);
            } else if (isPlaying) {
                analyser.getByteFrequencyData(dataArray);
                audioCurrentTime = audioCtx.currentTime - audioStartTime;
                if (audioCurrentTime >= audioBuffer.duration) { stopAudio(); }
                updateSubtitleProgress();
            } else {
                for(let i=0; i<dataArray.length; i++) { dataArray[i] = Math.max(0, dataArray[i] - 4); }
            }

            // --- 修改点：右半侧布局 (头像和频谱) ---
            // 将头像 X 坐标定在 920 (靠右)，Y 坐标 320 (稍微偏上一点点给频谱留空间)
            let avX = 920, avY = 320, avR = 140; 
            if (isPlaying || isExporting) { avatarRotation += 0.015; }

            // 3. 绘制头像
            if (avaImg.src && avaImg.width > 0) {
                rCtx.save();
                rCtx.shadowColor = "rgba(0, 242, 254, 0.25)";
                rCtx.shadowBlur = 40;
                rCtx.beginPath();
                rCtx.arc(avX, avY, avR, 0, Math.PI * 2);
                rCtx.closePath();
                rCtx.clip();
                rCtx.translate(avX, avY);
                rCtx.rotate(avatarRotation);
                rCtx.drawImage(avaImg, -avR, -avR, avR*2, avR*2);
                rCtx.restore();
                
                rCtx.save();
                rCtx.strokeStyle = "rgba(255,255,255,0.2)";
                rCtx.lineWidth = 4;
                rCtx.beginPath();
                rCtx.arc(avX, avY, avR, 0, Math.PI * 2);
                rCtx.stroke();
                rCtx.restore();
            }
            
            // 4. 绘制频谱
            rCtx.save();
            let barWidth = 4;
            let gap = 3;
            // 频谱中心对齐头像中心
            let startX = avX - (dataArray.length * (barWidth + gap)) / 4;
            let startY = 560; // 频谱在右侧头像下方
            const gradient = rCtx.createLinearGradient(0, startY, 0, startY - 100);
            gradient.addColorStop(0, 'rgba(0, 242, 254, 0.1)');
            gradient.addColorStop(1, 'rgba(79, 172, 254, 0.95)');
            
            dataArray.forEach((val, i) => {
                if(i % 2 === 0) { 
                    let h = (val / 255) * 100;
                    if (h < 4 && (isPlaying || isExporting)) h = 4; 
                    rCtx.fillStyle = gradient;
                    rCtx.fillRect(startX + i*(barWidth+gap)/2, startY - h, barWidth, h);
                }
            });
            rCtx.restore();

            // --- 修改点：左半侧布局 (滚动字幕) ---
            if (subtitleData.length > 0) {
                rCtx.save();
                // 限制字幕只在左侧 0-680 的区域显示，防止太长侵入右边
                rCtx.beginPath();
                rCtx.rect(40, 0, 640, 720); 
                rCtx.clip();
                
                rCtx.textAlign = "left";
                rCtx.textBaseline = "middle";
                
                // 计算平滑滚动
                let targetY = currentSubIndex >= 0 ? currentSubIndex * 60 : 0; 
                if (isPlaying || isExporting) {
                    lyricScrollY += (targetY - lyricScrollY) * 0.1; // 缓动插值
                } else {
                    lyricScrollY = targetY; // 暂停时直接归位
                }
                
                subtitleData.forEach((sub, i) => {
                    // 360 是屏幕垂直中心，每行间距 60
                    let y = 360 + (i * 60) - lyricScrollY; 
                    
                    // 根据距离中心点的远近计算透明度，实现上下淡出效果
                    let distance = Math.abs(y - 360);
                    let alpha = Math.max(0, 1 - distance / 250);
                    
                    if (alpha > 0.02) {
                        if (i === currentSubIndex) {
                            rCtx.font = "bold 34px -apple-system, BlinkMacSystemFont, sans-serif";
                            rCtx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                            rCtx.shadowColor = "rgba(0, 242, 254, 0.5)";
                            rCtx.shadowBlur = 15;
                        } else {
                            rCtx.font = "26px -apple-system, BlinkMacSystemFont, sans-serif";
                            rCtx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.4})`;
                            rCtx.shadowBlur = 0;
                        }
                        // 画在 X = 80 的位置，最大宽度 560
                        rCtx.fillText(sub.content, 80, y, 560);
                    }
                });
                rCtx.restore();
            }

            // 同步渲染到网页预览小窗
            pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
            pCtx.drawImage(rCanvas, 0, 0, pCanvas.width, pCanvas.height);
        }

        function extractSpectrumFromBuffer(time) {
            if (!audioBuffer) return;
            const sampleRate = audioBuffer.sampleRate;
            const startSample = Math.floor(time * sampleRate);
            const channelData = audioBuffer.getChannelData(0); 
            
            for (let i = 0; i < dataArray.length; i++) {
                let sampleIdx = startSample + i * 2;
                let val = 0;
                if (sampleIdx < channelData.length) {
                    val = Math.abs(channelData[sampleIdx]) * 350;
                }
                let target = Math.min(255, val * (1 + i / 32));
                dataArray[i] = dataArray[i] * 0.4 + target * 0.6; 
            }
        }

        function playAudio(startAt = 0) {
            if (!audioBuffer) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            audioSource = audioCtx.createBufferSource();
            audioSource.buffer = audioBuffer;
            audioSource.connect(analyser);
            
            audioStartTime = audioCtx.currentTime - startAt;
            audioSource.start(0, startAt);
            isPlaying = true;
            statusDot.classList.add('blink');
            statusText.innerText = "正在播放";
        }

        function stopAudio() {
            if (audioSource) {
                try { audioSource.stop(); } catch(e){}
                audioSource.disconnect();
                audioSource = null;
            }
            isPlaying = false;
            statusDot.classList.remove('blink');
            statusText.innerText = "已暂停";
        }

        function togglePlay() {
            if (isExporting || !audioBuffer) return;
            if (isPlaying) {
                audioCurrentTime = audioCtx.currentTime - audioStartTime;
                stopAudio();
            } else {
                if (audioCurrentTime >= audioBuffer.duration) audioCurrentTime = 0;
                playAudio(audioCurrentTime);
            }
        }

        document.getElementById('playZone').onclick = () => togglePlay();
        window.addEventListener('keydown', (e) => {
            if (e.code === "Space") { e.preventDefault(); togglePlay(); }
        });

        document.getElementById('subInput').onchange = (e) => {
            if(!e.target.files[0]) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const text = event.target.result;
                const container = document.getElementById('lyrics');
                container.innerHTML = "";
                subtitleData = [];
                currentSubIndex = -1;

                const regex = /(\d{2}:\d{2}:\d{2}[\.,]\d{3}) --> (\d{2}:\d{2}:\d{2}[\.,]\d{3})\s*\n([\s\S]*?)(?=\n\n|\n\d|\n\d{2}:|$)/g;
                let match;
                while ((match = regex.exec(text)) !== null) {
                    const start = timeToSec(match[1]);
                    const end = timeToSec(match[2]);
                    const content = match[3].replace(/\r?\n/g, " ").trim();
                    subtitleData.push({ start, end, content });
                    
                    const div = document.createElement('div');
                    div.className = 'line';
                    div.innerText = content;
                    div.onclick = (event) => {
                        event.stopPropagation();
                        audioCurrentTime = start;
                        if (isPlaying) { stopAudio(); playAudio(start); } else { updateSubtitleProgress(); }
                    };
                    container.appendChild(div);
                }
                if (subtitleData.length > 0 && !isPlaying) renderFrame(); // 刷新预览
            };
            reader.readAsText(e.target.files[0]);
        };

        function updateSubtitleProgress() {
            const lines = document.querySelectorAll('.line');
            let found = false;
            subtitleData.forEach((sub, index) => {
                if (audioCurrentTime >= sub.start && audioCurrentTime <= sub.end) {
                    found = true;
                    currentSubtitleText = sub.content;
                    currentSubIndex = index; // 记录当前索引用于画板内的滚动
                    
                    const currentActive = document.querySelector('.line.active');
                    if (currentActive && currentActive !== lines[index]) currentActive.classList.remove('active');
                    if (!lines[index].classList.contains('active')) {
                        lines[index].classList.add('active');
                        lines[index].scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }
            });
            if(!found) {
                currentSubtitleText = ""; 
                // 此处不强制清理 currentSubIndex 使得间奏时字幕也能停留在最后一句不乱跳
            }
        }

        function timeToSec(t) {
            const parts = t.split(/:|[\.,]/);
            return parseInt(parts[0])*3600 + parseInt(parts[1])*60 + parseInt(parts[2]) + parseInt(parts[3])/1000;
        }

        exportBtn.onclick = function(e) {
            e.stopPropagation();
            if (isExporting || !audioBuffer) return;

            isExporting = true;
            exportBtn.disabled = true;
            stopAudio();

            statusDot.classList.add('blink');
            statusText.innerText = "后台沙盒引擎初始化...";
            capturer = new CCapture({ 
                format: 'webm', 
                workersPath: 'https://cdn.jsdelivr.net/npm/ccapture.js@1.1.0/src/',
                framerate: FPS,
                name: `Render_${Date.now()}`,
                quality: 100 
            });
            audioCurrentTime = 0;
            avatarRotation = 0;
            capturer.start();

            const workerCode = `
                self.onmessage = function(e) {
                    if (e.data === 'next') {
                        setTimeout(function() { self.postMessage('tick'); }, 0);
                    }
                };
            `;
            const blob = new Blob([workerCode], { type: 'application/javascript' });
            bgWorker = new Worker(URL.createObjectURL(blob));

            function renderStep() {
                if (!isExporting) return;
                
                renderFrame();
                updateSubtitleProgress();
                
                capturer.capture(rCanvas);

                audioCurrentTime += 1 / FPS;

                if (audioCurrentTime >= audioBuffer.duration) {
                    statusText.innerText = "打包封装中，请不要关闭网页...";
                    bgWorker.terminate();
                    bgWorker = null;

                    capturer.stop();
                    capturer.save();
                    
                    isExporting = false;
                    exportBtn.disabled = false;
                    audioCurrentTime = 0;
                    statusText.innerText = "后台无损视频合成完毕！";
                    drawFrameLoop();
                } else {
                    let progress = ((audioCurrentTime / audioBuffer.duration) * 100).toFixed(1);
                    statusText.innerText = `[可切后台挂机] 视频合成中: ${progress}%`;
                    bgWorker.postMessage('next');
                }
            }

            bgWorker.onmessage = function(e) {
                if (e.data === 'tick') {
                    renderStep();
                }
            };

            bgWorker.postMessage('next');
        };
    </script>
</body>
</html>
